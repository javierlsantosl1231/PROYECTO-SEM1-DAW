<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Web Asignatura - Colores Vivos</title>
    <style>
        body {
            /* Background: a vibrant electric blue */
            background-color: #007bff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; /* Base text color for contrast */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); /* Minor drop shadow for text contrast */
        }

        h1 {
            /* Main title: a hot, vibrant orange */
            color: #ff5722;
            background-color: white; /* Contrast box */
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            /* Subtitle: a cheerful, bright lime green */
            color: #ccff00;
            margin-top: 20px;
            text-align: center;
            max-width: 80%;
        }

        h3 {
            /* Author name: a bright, vivid cyan/aqua */
            color: #00ffff;
            background-color: rgba(255,255,255,0.2); /* Semi-transparent background */
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <!-- Título Principal con el nombre del sistema - Vívido Naranja/Blanco -->
    <h1>Sistema de Gestión de Ventas XYZ</h1>

    <!-- Subtítulo con el propósito del proyecto - Vívido Lima Green -->
    <h2>Plataforma para administrar clientes, productos y facturación</h2>

    <!-- Tercer encabezado con la autoría del estudiante - Vívido Cyan -->
    <h3>Desarrollado por Javier Leonel</h3>

</body>
</html>
